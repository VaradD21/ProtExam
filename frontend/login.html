<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProExam - Login</title>
  <link rel="stylesheet" href="css/login-styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>ProExam</h1>
      <p class="subtitle">Online Examination System</p>

      <div class="role-selector">
        <button class="role-btn active" data-role="student">Student</button>
        <button class="role-btn" data-role="organizer">Organizer</button>
      </div>

      <form id="authForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email">
          <div class="input-hint">Use a valid email address</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password" minlength="6">
          <div class="input-hint">Minimum 6 characters</div>
        </div>

        <div id="registerFields" style="display: none;">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" autocomplete="name" placeholder="Enter your full name">
            <div class="input-hint">Your complete name as it appears on official documents</div>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-primary" id="submitBtn">
            <span class="btn-text">Login</span>
            <div class="loading-spinner" style="display: none;"></div>
          </button>
        </div>

        <div class="toggle-auth">
          <p>Don't have an account? <a href="#" id="toggleRegister">Register</a></p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
