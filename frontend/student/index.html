<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure online examination platform with anti-cheating features">
  <meta name="theme-color" content="#2563eb">
  <title>ProExam - Student Exam Interface</title>
  <link rel="preconnect" href="http://localhost:8000">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/config.js" defer></script>
  <script src="js/antiCheating.js" defer></script>
  <script src="js/examInterface.js" defer></script>
  <script>
    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('../sw.js')
          .then(registration => {
            console.log('ServiceWorker registered successfully');
          })
          .catch(error => {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="exam-container" id="examContainer">
    <!-- Header -->
    <header class="exam-header">
      <div class="header-left">
        <h2 id="examTitle">Exam Title</h2>
        <div class="exam-info" aria-live="polite">
          <span id="currentQuestion">Question: 1</span>
          <span id="totalQuestions">of 0</span>
        </div>
      </div>
      <div class="header-middle">
        <div class="timer" id="timer" aria-live="polite" aria-label="Exam timer">00:00:00</div>
        <div class="timer-status" id="timerStatus" aria-live="assertive"></div>
      </div>
      <div class="header-right">
        <button class="btn-theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle between light and dark theme">
          <span class="theme-icon">🌙</span>
        </button>
        <button class="btn-logout" id="logoutBtn" aria-label="Logout from exam">Logout</button>
      </div>
    </header>

    <div class="proctoring-header" id="proctoringHeader">
      <div class="camera-box">
        <video id="cameraFeed" autoplay muted playsinline></video>
        <p class="camera-label">Live Camera (proctoring will send snapshots automatically)</p>
      </div>
      <div class="camera-status" id="cameraStatus">Camera: initializing...</div>
    </div>

    <!-- Violation Warning -->
    <div id="violationWarning" class="violation-warning" style="display: none;">
      <span id="violationText"></span>
      <button class="btn-close-warning" id="closeWarningBtn">✕</button>
    </div>

    <!-- Main Content -->
    <main class="exam-content" id="main-content">
      <!-- Question Navigation -->
      <aside class="question-panel" role="navigation" aria-label="Question navigation">
        <div class="panel-header">
          <h3>Questions</h3>
          <div class="filter-buttons" role="group" aria-label="Question filters">
            <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
            <button class="filter-btn" data-filter="answered" aria-pressed="false">Answered</button>
            <button class="filter-btn" data-filter="unanswered" aria-pressed="false">Unanswered</button>
          </div>
        </div>
        <div class="questions-list" id="questionsList"></div>
      </aside>

      <!-- Question Display -->
      <section class="question-area" role="main" aria-label="Current question">
        <div class="question-content">
          <h3 id="questionNumber" aria-live="polite">Question 1</h3>
          <div class="question-text" id="questionText" aria-live="polite">Loading question...</div>

          <!-- MCQ Options -->
          <div id="mcqOptions" class="mcq-options" style="display: none;" role="radiogroup" aria-label="Multiple choice options"></div>

          <!-- Descriptive Answer -->
          <div id="descriptiveAnswer" class="descriptive-answer" style="display: none;">
            <label for="answerTextarea" class="sr-only">Your answer</label>
            <textarea id="answerTextarea" placeholder="Type your answer here..." rows="8" aria-label="Descriptive answer input"></textarea>
          </div>

          <!-- Question Navigation Buttons -->
          <div class="navigation-buttons" role="group" aria-label="Question navigation">
            <button class="btn-nav" id="prevBtn" aria-label="Go to previous question">← Previous</button>
            <button class="btn-submit-q" id="submitQBtn" aria-label="Save answer and go to next question">Save & Next</button>
          </div>
        </div>

        <!-- Submit Exam Button -->
        <div class="submit-exam-section">
          <button class="btn-submit-exam" id="submitExamBtn">Submit Exam</button>
          <p class="warning-text">Submitting the exam will end your session</p>
        </div>
      </main>
    </div>

    <!-- Suspicious Activity Indicator -->
    <div class="activity-indicator">
      <div class="violation-count">
        <span>⚠️ Violations:</span>
        <span id="violationCount">0</span>
      </div>
      <div class="status-indicator">
        <span>Status:</span>
        <span id="statusIndicator" class="status-safe">Active</span>
      </div>
    </div>
  </div>
</body>
</html>
